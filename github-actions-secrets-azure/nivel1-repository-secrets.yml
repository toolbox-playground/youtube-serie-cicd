name: Nível 1 - Repository Secrets

on:
  workflow_dispatch:  # Execução manual para demo

# ❌ NUNCA faça isso:
# env:
#   AZURE_CLIENT_SECRET: "abc123-super-secreto"   # exposto no repositório!
 
# ✅ O jeito certo
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Deploy usando Repository Secrets
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
        run: |
          echo "Fazendo deploy com credenciais seguras"
          # ./deploy.sh ou seus comandos de deploy
          
      - name: Verificar que secrets não aparecem nos logs
        env:
          SECRET_VALUE: ${{ secrets.AZURE_CLIENT_SECRET }}
        run: |
          echo "Secret value: $SECRET_VALUE"  # Aparecerá como ***
          echo "Deploy concluído com sucesso!"