name: Nível 2 - Environment Secrets

on:
  push:
    branches:
      - main
      - develop
  workflow_dispatch:  # Execução manual para demo

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    environment: staging          # acessa secrets de staging
    if: github.ref == 'refs/heads/develop'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Deploy para Staging
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}  # valor de staging
          API_KEY: ${{ secrets.API_KEY }}
        run: |
          echo "Fazendo deploy para STAGING"
          echo "Database: staging environment"
          # ./deploy.sh staging
 
  deploy-production:
    runs-on: ubuntu-latest
    environment: production        # requer aprovação! acessa secrets de prod
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Deploy para Production
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}  # valor de prod
          API_KEY: ${{ secrets.API_KEY }}
        run: |
          echo "Fazendo deploy para PRODUCTION"
          echo "Database: production environment"
          echo "⚠️  Este job requer aprovação manual!"
          # ./deploy.sh production