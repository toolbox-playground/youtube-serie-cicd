name: Nível 3 - Organization Secrets

on:
  workflow_dispatch:  # Execução manual para demo
  push:
    branches: [main]

# Este workflow demonstra o uso de Organization Secrets
# que são compartilhados entre múltiplos repositórios da organização

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}   # Organization Secret
          password: ${{ secrets.DOCKERHUB_TOKEN }}      # Organization Secret
      
      - name: Build e Push da imagem
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/meu-app:${{ github.sha }} .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/meu-app:${{ github.sha }}
  
  deploy-with-shared-credentials:
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production  # Combina org secrets com environment protection
    steps:
      - name: Deploy usando credenciais compartilhadas
        env:
          # Organization Secrets (compartilhados)
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          DOCKER_REGISTRY: ${{ secrets.DOCKERHUB_USERNAME }}
          
          # Repository/Environment Secrets (específicos)
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          echo "Fazendo deploy da imagem: $DOCKER_REGISTRY/meu-app:${{ github.sha }}"
          echo "Subscription: $AZURE_SUBSCRIPTION_ID"
          echo "Database: environment específico"
          # Comandos de deploy...