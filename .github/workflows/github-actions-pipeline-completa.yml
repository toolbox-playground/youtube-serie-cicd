# GitHub Actions pipeline — tutorial workflow
# Steps: checkout → install → build → test → deploy to GitHub Pages

name: Build and deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'github-actions-pipeline-completa/**'

jobs:
################# CI #################
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: github-actions-pipeline-completa
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"
          cache-dependency-path: github-actions-pipeline-completa/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: github-actions-pipeline-completa/dist/

################# CD #################
  deploy:
    runs-on: ubuntu-latest
    needs: build #### depende do build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
