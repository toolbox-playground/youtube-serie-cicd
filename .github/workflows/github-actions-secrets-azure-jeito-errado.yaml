name: Azure Deploy Example

on:
  workflow_dispatch:  # Execução manual apenas

# ❌ NUNCA faça isso:
# env:
#   AZURE_CLIENT_SECRET: "abc123-super-secreto"   # exposto no repositório!
 
# ✅ O jeito certo
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Deploy to Azure
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}  # também necessário
        run: |
          chmod +x ./deploy.sh
          ./deploy.sh
