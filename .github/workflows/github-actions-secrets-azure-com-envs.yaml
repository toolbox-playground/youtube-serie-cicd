name: Deploy Application

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    environment: staging          # acessa secrets de staging
    if: github.ref == 'refs/heads/develop'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Deploy to staging
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}  # valor de staging
        run: |
          chmod +x ./deploy.sh
          ./deploy.sh
 
  deploy-production:
    runs-on: ubuntu-latest
    environment: production        # requer aprovação! acessa secrets de prod
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Deploy to production
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}  # valor de prod
        run: |
          chmod +x ./deploy.sh
          ./deploy.sh
